sources:
    - name: jaffle_shop
      description: This is a replica of the Postgres database used by our app
      database: raw
      schema: jaffle_shop
      config:
        freshness:
          warn_after:
            count: 12
            period: hour
          error_after:
            count: 2
            period: day
        loaded_at_field: _etl_loaded_at
      tables:
          - name: customers
            description: Raw customer data.
            config:
              freshness: null
            columns:
              - name: id
                description: the primary key
                data_tests:
                  - unique
                  - not_null
          - name: orders
            description: Raw orders data.
            columns:
              - name: id 
                description: the primary key
                data_tests:
                  - unique
                  - not_null